name: Supabase keep-alive

# Pings the database once a day so the free-tier project never auto-pauses.
# Add repository secrets: SUPABASE_URL and SUPABASE_ANON_KEY.
on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          curl -fsS \
            "${{ secrets.SUPABASE_URL }}/rest/v1/classes?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            > /dev/null && echo "Supabase pinged."
